{% extends 'base.html' %}

{% block content %}
<div class="bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
            Book {{ destination.title }}
        </h2>
        <p class="mt-2 text-center text-sm text-gray-600">
            ${{ destination.price_per_person }} per person
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-xl sm:rounded-lg sm:px-10 border border-gray-100">
            <form class="space-y-6" action="{% url 'book_destination' destination.pk %}" method="POST">
                {% csrf_token %}
                <div>
                    <label for="number_of_people" class="block text-sm font-medium text-gray-700">
                        Number of People
                    </label>
                    <div class="mt-1">
                        <input id="number_of_people" name="number_of_people" type="number" min="1" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm">
                    </div>
                </div>

                <div class="pt-4 flex items-center justify-between">
                    <span class="text-sm text-gray-500">Total Estimate: </span>
                    <span id="total_price" class="text-xl font-bold text-gray-900">$0.00</span>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
                        Confirm Booking
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const input = document.getElementById('number_of_people');
        const total = document.getElementById('total_price');
        const pricePerPerson = {{ destination.price_per_person }};

        input.addEventListener('input', function() {
            const count = parseInt(input.value) || 0;
            total.textContent = '$' + (count * pricePerPerson).toFixed(2);
        });
    });
</script>
{% endblock %}
